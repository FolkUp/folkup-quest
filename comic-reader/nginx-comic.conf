server {
    listen 80;
    server_name comic.folkup.app;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "0" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # /ru and /en — serve index.html from subdirectories
    location = /ru {
        return 301 /ru/;
    }
    location = /en {
        return 301 /en/;
    }

    # Comic page images — long cache
    location /pages/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # Fonts — long cache
    location /fonts/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # Downloads — stable
    location /downloads/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # SW — always revalidate
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Default try_files
    location / {
        try_files $uri $uri/ =404;
    }
}
