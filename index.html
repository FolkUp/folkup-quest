<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FolkUp Quest</title>
  <meta name="description" content="Интерактивный текстовый квест от FolkUp. История о коде, людях и выборе.">

  <meta name="theme-color" content="#1a1714">
  <meta name="color-scheme" content="dark">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- OG Meta -->
  <meta property="og:title" content="FolkUp Quest">
  <meta property="og:description" content="Интерактивный текстовый квест. 35 минут. 9 выборов. 3 концовки.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://quest.folkup.app">
  <meta property="og:image" content="https://quest.folkup.app/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Fonts (preload critical, avoid @import waterfall) -->
  <link rel="stylesheet" href="/fonts/fonts.css">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles/_variables.css">
  <link rel="stylesheet" href="/styles/_typography.css">
  <link rel="stylesheet" href="/styles/_layout.css">
</head>
<body>
  <a href="#story" class="skip-link">Перейти к содержанию</a>
  <main id="game">
    <!-- Lamp indicator -->
    <div id="lamp" data-state="steady" role="img" aria-label="Лампа Lucerna"></div>

    <!-- Progress (3 acts) -->
    <nav id="progress" aria-label="Прогресс по актам" style="display: none;">
      <span class="progress-dot" data-dot="1" aria-label="Акт I"></span>
      <span class="progress-dot" data-dot="2" aria-label="Акт II"></span>
      <span class="progress-dot" data-dot="3" aria-label="Акт III"></span>
    </nav>

    <!-- Start screen -->
    <div id="start-screen">
      <h1>FolkUp Quest</h1>
      <p>Интерактивный текстовый квест. 35 минут. 9 выборов. 3 концовки.</p>
      <button class="start-btn" id="new-game-btn">Начать</button>
      <button class="start-btn" id="continue-game-btn" style="display: none; background: var(--color-surface); border: 1px solid var(--color-divider);">Продолжить</button>
    </div>

    <!-- Story area -->
    <section id="story" aria-live="polite" aria-atomic="false" style="display: none;"></section>

    <!-- Choices -->
    <div id="choices" role="group" aria-label="Варианты выбора"></div>

    <!-- Continue button -->
    <button id="continue-btn" aria-label="Продолжить чтение">Продолжить ▸</button>

    <!-- Footer -->
    <footer id="footer-nav">
      <button id="restart-btn" class="footer-link" style="display: none; background: none; border: none; cursor: pointer; font: inherit;">Начать заново</button>
      <p class="footer-disclaimer">Все имена, события и персонажи вымышлены. Контент создан с использованием автоматизированных инструментов и прошёл редакторскую проверку.</p>
      <a href="/legal/privacy.html" class="footer-link">Конфиденциальность</a>
      <a href="/legal/terms.html" class="footer-link">Условия</a>
      <a href="/legal/cookies.html" class="footer-link">Cookies</a>
    </footer>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
