server {
    listen 80;
    server_name quest.folkup.app;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "0" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; media-src 'self'; connect-src 'self' https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Vite hashed assets — immutable
    location /assets/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SW — always revalidate
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
    }

    # Fonts
    location /fonts/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # Audio
    location /audio/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # Images
    location /images/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
